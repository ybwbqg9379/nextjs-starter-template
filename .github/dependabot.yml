version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    # TODO: Add your GitHub username as reviewer
    # reviewers:
    #   - your-username
    labels:
      - dependencies
    groups:
      next-ecosystem:
        patterns:
          - next
          - next-*
          - eslint-config-next
      react:
        patterns:
          - react
          - react-dom
          - '@types/react'
          - '@types/react-dom'
      tailwind:
        patterns:
          - tailwindcss
          - '@tailwindcss/*'
      testing:
        patterns:
          - vitest
          - '@testing-library/*'
          - '@vitejs/*'
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
